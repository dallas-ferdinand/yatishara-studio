<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <title>Yatishara Studio</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
        gap: 12px;
      }
      a,
      button {
        color: #fff;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        padding: 10px 16px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <p id="status">Opening Yatishara Studio…</p>
      <p>
        <a id="open" href="https://studio.yatishara.com/">Open Studio</a>
      </p>
      <button id="retry" type="button" hidden>Retry</button>
    </main>
    <script>
      (function () {
        var LIVE = "https://studio.yatishara.com/";
        var statusEl = document.getElementById("status");
        var retryEl = document.getElementById("retry");
        function go() {
          location.replace(LIVE);
        }
        retryEl.addEventListener("click", go);
        // Capacitor normally loads server.url directly. This page is only a
        // fallback if the bridge/config fails to inject the remote URL.
        try {
          go();
        } catch (err) {
          statusEl.textContent = "Could not open Studio. Check your connection.";
          retryEl.hidden = false;
        }
        window.setTimeout(function () {
          if (location.href.indexOf("studio.yatishara.com") === -1) {
            statusEl.textContent = "Still opening… tap Retry if this stays.";
            retryEl.hidden = false;
          }
        }, 4000);
      })();
    </script>
  </body>
</html>
